<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoyalGroom Checkout</title>
<link rel="stylesheet" href="style.css">

<style>

/* ===== CHECKOUT PAGE ===== */

.checkout-wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
padding:40px;
max-width:1200px;
margin:auto;
}

/* LEFT FORM */
.checkout-form{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.checkout-form h2{
margin-bottom:20px;
color:#111;
}

/* INPUT GROUP */
.input-group{
position:relative;
margin-bottom:20px;
}

.input-group input,
.input-group textarea{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:6px;
outline:none;
font-size:15px;
}

.input-group label{
position:absolute;
top:-10px;
left:12px;
background:white;
padding:0 6px;
font-size:13px;
color:#666;
}

/* PAYMENT BOX */
.payment-box{
background:#fafafa;
padding:15px;
border-radius:6px;
border:1px dashed #d4af37;
margin-top:10px;
font-weight:bold;
}

/* ORDER SUMMARY */
.order-summary{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
height:fit-content;
}

.order-summary h3{
margin-bottom:15px;
}

.summary-row{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.total{
font-size:20px;
font-weight:bold;
color:#d4af37;
}

/* PLACE ORDER BUTTON */
.place-order{
width:100%;
margin-top:20px;
padding:15px;
background:#111;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.place-order:hover{
background:#d4af37;
color:black;
}

/* RESPONSIVE */
@media(max-width:900px){
.checkout-wrapper{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<header>
<div class="logo">RoyalGroom</div>
<nav>
<a href="index.html">Home</a>
<a href="products.html">Collection</a>
<a href="cart.html">Cart</a>
</nav>
</header>

<div class="checkout-wrapper">

<!-- LEFT SIDE FORM -->
<div class="checkout-form">
<h2>Groom Delivery Details</h2>

<form onsubmit="placeOrder(event)">

<div class="input-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="tel" required>
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" required>
</div>

<div class="input-group">
<label>Delivery Address</label>
<textarea rows="4" required></textarea>
</div>

<div class="input-group">
<label>Wedding Date</label>
<input type="date" required>
</div>

<div class="payment-box">
💰 Payment Method: Cash On Delivery (COD)
</div>

<button class="place-order">Place Wedding Order</button>

</form>
</div>

<!-- RIGHT SIDE SUMMARY -->
<div class="order-summary">

<h3>Order Summary</h3>

<div class="summary-row">
<span>Items Total</span>
<span id="summaryTotal">₹0</span>
</div>

<div class="summary-row">
<span>Delivery</span>
<span>FREE</span>
</div>

<hr>

<div class="summary-row total">
<span>Total Payable</span>
<span id="finalTotal">₹0</span>
</div>

<p style="margin-top:15px;font-size:13px;color:gray;">
✔ Secure Checkout<br>
✔ Premium Groom Packaging<br>
✔ Delivery within 5–7 days
</p>

</div>

</div>

<footer>
<p>© 2026 RoyalGroom Wedding Store</p>
</footer>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

/* SAFE TOTAL CALCULATION */
cart.forEach(item => {

    let price = Number(item.price) || 0;
    let qty = Number(item.qty) || 1; // fallback if qty missing

    total += price * qty;
});

/* UPDATE UI */
document.getElementById("summaryTotal").innerText = "₹" + total;
document.getElementById("finalTotal").innerText = "₹" + total;

});
</script>

</body>
</html>
